<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#faf8ef">
    <meta name="description" content="Threes - A tiny puzzle that grows on you">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Threes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <link rel="stylesheet" href="css/style.css">
    <title>Threes</title>
</head>
<body>
    <header class="header">
        <h1 class="title">Threes</h1>
        <div class="scores">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="high-score">0</div>
            </div>
        </div>
    </header>

    <main class="game-wrapper">
        <div class="game-container">
            <div class="board" id="board"></div>
        </div>

        <aside class="ai-sidebar">
            <h3 class="sidebar-title">AI Controls</h3>
            <div class="ai-loading" id="ai-loading">
                <div class="spinner"></div>
                <span>Loading model...</span>
            </div>
            <div class="ai-content" id="ai-content" style="display: none;">
                <div class="ai-hint" id="ai-hint" style="display: none;">
                    <span class="ai-label">AI:</span>
                    <span id="ai-action">-</span>
                </div>
                <div class="ai-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="expectimax-toggle">
                        <span>Expectimax</span>
                    </label>
                    <label class="depth-label" id="depth-container" style="display: none;">
                        Depth: <select id="expectimax-depth">
                            <option value="1">1</option>
                            <option value="2" selected>2</option>
                        </select>
                    </label>
                </div>
                <div class="ai-buttons">
                    <button class="btn btn-secondary" id="ai-btn">AI Hint</button>
                    <button class="btn btn-secondary" id="auto-ai-btn">Auto AI</button>
                </div>
                <div class="speed-control" id="speed-container" style="display: none;">
                    <label class="speed-label">
                        Target: <span id="speed-value">10</span>/s
                    </label>
                    <input type="range" id="ai-speed" min="0" max="10" value="5" class="speed-slider">
                    <label class="speed-label speed-actual">
                        Actual: <span id="speed-actual">-</span>/s
                    </label>
                </div>
            </div>
        </aside>
    </main>

    <footer class="controls">
        <div class="next-tile">
            <span class="next-tile-label">Next:</span>
            <div class="next-tile-box" id="next-tile">
                <span id="next-tile-value">3</span>
            </div>
        </div>
        <div class="footer-buttons">
            <button class="sound-toggle" id="sound-toggle" aria-label="Toggle sound">
                <span id="sound-icon">🔊</span>
            </button>
            <button class="btn btn-secondary" id="new-game-btn">New Game</button>
        </div>
    </footer>

    <!-- Game Over Modal -->
    <div class="overlay" id="game-over">
        <div class="modal">
            <h2>Game Over</h2>
            <div class="score-display" id="final-score">0</div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="highest-tile">0</div>
                    <div class="stat-label">Highest Tile</div>
                </div>
            </div>
            <p class="new-high-score" id="new-high-score" style="display: none;">New High Score!</p>
            <div class="buttons">
                <button class="btn btn-primary" id="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="overlay" id="confirm-dialog">
        <div class="modal">
            <h2>Confirm</h2>
            <p id="confirm-message">Start new game? Current progress will be lost.</p>
            <div class="buttons">
                <button class="btn btn-secondary" id="confirm-no">Cancel</button>
                <button class="btn btn-primary" id="confirm-yes">Yes</button>
            </div>
        </div>
    </div>

    <!-- ONNX Runtime Web for AI -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>

    <script src="js/game.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/expectimax.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
